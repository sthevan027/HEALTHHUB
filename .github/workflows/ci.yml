name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthhub
          POSTGRES_PASSWORD: healthhub
          POSTGRES_DB: healthhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: backend
        run: pnpm run build

      - name: Test
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://healthhub:healthhub@localhost:5432/healthhub
        run: pnpm test

  mobile:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: mobile
        run: pnpm run typecheck
