services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: healthhub
      POSTGRES_PASSWORD: healthhub
      POSTGRES_DB: healthhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://healthhub:healthhub@postgres:5432/healthhub
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
